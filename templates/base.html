{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vivek Kumar | Full Stack Developer</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
  <link href="{% static 'css/styles.css' %}" rel="stylesheet">
  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
    }
  </style>
  <!-- Skill Style -->
  <style>
    .skill {
      padding: 12px;
      background: #111827;
      border: 1px solid #1f2937;
      text-align: center;
      border-radius: 8px;
      transition: 0.3s;
    }

    .skill:hover {
      background: #111827;
      border-color: #2563eb;
      color: #60a5fa;
    }
  </style>
</head>

<body class="bg-gray-950 text-gray-200 scroll-smooth">
  
  <!-- Loader -->
  <div id="loader" class="fixed inset-0 bg-gray-950 z-[9999] hidden">
    <div class="absolute top-5 left-6 text-sm text-gray-300">
      Loading portfolio...
    </div>
    <div class="absolute bottom-5 right-6 text-6xl font-light text-white" id="progress">
      0%
    </div>
  </div>

  <!-- Navbar -->
  <nav class="border-b border-gray-800 bg-gray-950">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">

      <!-- Logo -->
      <h1 class="text-xl font-bold tracking-wide text-white">Vivek Kumar</h1>

      <!-- Desktop Menu -->
      <div class="hidden md:flex space-x-8 text-gray-300">
        <a href="{% url 'home' %}" class="hover:text-blue-400">Home</a>
        <a href="{% url 'certificates' %}" class="hover:text-blue-400">Certificates</a>
        <a href="{% url 'contact' %}" class="hover:text-blue-400">Contact</a>
      </div>

      <!-- Theme Toggle -->
      <!-- <button id="themeToggle" class="ml-4 p-2 rounded-lg
         bg-gray-200 dark:bg-gray-800
         text-gray-800 dark:text-gray-200
         hover:scale-110 active:scale-95
         transition-transform duration-300" aria-label="Toggle Theme">
        🌙
      </button> -->

      <!-- Mobile Button -->
      <button id="menu-btn" class="md:hidden text-gray-300 focus:outline-none">
        <!-- Hamburger Icon -->
        <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
      </button>
    </div>

    <!-- Mobile Menu -->
    <div id="mobile-menu" class="hidden md:hidden bg-gray-900 border-t border-gray-800">
      <a href="/" class="block px-6 py-4 hover:bg-gray-800">Home</a>
      <a href="certificates/" class="block px-6 py-4 hover:bg-gray-800">Certificates</a>
      <a href="contact/" class="block px-6 py-4 hover:bg-gray-800">Contact</a>
    </div>
  </nav>

  <!-- Content Block -->
   {% block main %}
   {% endblock %}

  <!-- Footer -->
  <footer class="border-t border-gray-800 py-6">
    <div class="max-w-6xl mx-auto px-6 text-center text-gray-500">
      © 2025 Vivek Kumar • All Rights Reserved
    </div>
  </footer>

  <script src="{% static 'js/responsive.js' %}"></script>
  <script src="{% static 'js/script.js' %}"></script>
  <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

</body>
</html>
